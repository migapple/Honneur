<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Légion d'Honneur</title>
<style>
:root{--fs:1;--bg:#0b0a06;--bg2:#13100a;--card:#1a1508;--gold:#c9a84c;--gold2:#e8c97a;--red:#8b1a1a;--red2:#c0392b;--text:#f0e8d8;--muted:#7a6a5a;--accent:#8b1a1a;--sep:rgba(201,168,76,.13)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Georgia',serif}
#app{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.header{padding-top:calc(12px + env(safe-area-inset-top));background:var(--bg);flex-shrink:0;border-bottom:1px solid var(--sep)}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:0 14px 10px}
.header h1{font-size:calc(16px * var(--fs));color:var(--gold);letter-spacing:.6px;font-style:italic;font-weight:normal}
.hicons{display:flex;gap:8px}
.ibtn{background:none;border:none;color:var(--gold);font-size:calc(20px * var(--fs));cursor:pointer;padding:4px}
.search-wrap{position:relative;padding:0 12px 10px}
.search-input{width:100%;background:rgba(255,255,255,.07);border:1px solid var(--sep);border-radius:10px;padding:8px 36px 8px 12px;color:var(--text);font-size:calc(13px * var(--fs));font-family:inherit;outline:none;-webkit-appearance:none}
.search-input::placeholder{color:var(--muted)}
.search-clear{position:absolute;right:20px;top:calc(50% - 5px);transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;width:22px;height:22px;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:calc(13px * var(--fs));cursor:pointer;line-height:1;padding:0}
.chips-bar{display:flex;overflow-x:auto;gap:6px;padding:0 12px 10px;scrollbar-width:none;flex-shrink:0}
.chips-bar::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:calc(11px * var(--fs));cursor:pointer;border:1px solid var(--sep);background:none;color:var(--muted);font-family:inherit;white-space:nowrap;transition:all .18s}
.chip.active{background:rgba(139,26,26,.25);border-color:var(--red2);color:var(--gold2)}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(10px + env(safe-area-inset-bottom))}
.section-hdr{padding:9px 14px 5px;font-size:calc(10px * var(--fs));color:var(--gold);text-transform:uppercase;letter-spacing:1.5px;background:var(--bg);position:sticky;top:0;z-index:5;border-bottom:1px solid var(--sep)}
.prow{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--sep);cursor:pointer;background:var(--bg);transition:background .15s}
.prow:active{background:var(--card)}
.row-img{width:54px;height:54px;border-radius:10px;background:#1e1510;flex-shrink:0;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;font-size:calc(26px * var(--fs))}
.row-img img{width:100%;height:100%;object-fit:cover;object-position:center 20%;position:absolute;inset:0;display:none}
.row-info{flex:1;min-width:0}
.row-name{font-size:calc(14px * var(--fs));color:var(--text);margin-bottom:2px;font-style:italic}
.row-dates{font-size:calc(11px * var(--fs));color:var(--muted)}
.row-cat{font-size:calc(10px * var(--fs));color:var(--gold);margin-top:2px}
.row-badge{font-size:calc(10px * var(--fs));color:var(--red2);margin-top:1px;font-weight:bold}
.row-flag{font-size:calc(18px * var(--fs));flex-shrink:0}
.row-arr{color:var(--muted);font-size:calc(16px * var(--fs));flex-shrink:0}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:calc(14px * var(--fs));font-style:italic}
/* SHEET */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.on{opacity:1;pointer-events:all}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:101;background:var(--bg2);border-radius:20px 20px 0 0;border-top:1px solid rgba(201,168,76,.3);transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,0,1);max-height:92vh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom)}
.sheet.on{transform:translateY(0)}
.sh-handle{width:38px;height:4px;background:rgba(255,255,255,.18);border-radius:2px;margin:10px auto 0}
.sh-scroll{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.sh-head{padding:14px 18px 0;display:flex;justify-content:space-between;align-items:flex-start}
.sh-title{flex:1}
.sh-name{font-size:calc(21px * var(--fs));color:var(--gold2);font-style:italic;line-height:1.2}
.sh-dates{font-size:calc(11px * var(--fs));color:var(--muted);letter-spacing:.8px;margin-top:2px}
.sh-country{font-size:calc(12px * var(--fs));color:var(--text);margin-top:3px}
.sh-tag{display:inline-block;margin-top:6px;padding:3px 10px;border-radius:20px;background:rgba(139,26,26,.3);border:1px solid rgba(192,57,43,.5);font-size:calc(10.5px * var(--fs));color:var(--gold)}
.sh-grade{display:inline-block;margin-top:4px;margin-left:6px;padding:3px 10px;border-radius:20px;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.35);font-size:calc(10px * var(--fs));color:var(--gold2);font-style:italic}
.sh-close{background:none;border:none;color:var(--muted);font-size:calc(26px * var(--fs));cursor:pointer;padding:0 0 0 10px;line-height:1;flex-shrink:0}
.sh-img-wrap{margin:14px 16px 0;border-radius:13px;overflow:hidden;background:#1a1208;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;position:relative}
.sh-img-wrap img{width:100%;height:100%;object-fit:contain;object-position:center center;position:absolute;inset:0;display:none}
.sh-img-ph{font-size:calc(60px * var(--fs));position:relative;z-index:1}
.sh-oeuvre-cap{margin:5px 16px 0;font-size:calc(11px * var(--fs));color:var(--gold2);text-align:center;font-style:italic}
.sh-body{padding:14px 18px 20px}
.slabel{font-size:calc(10px * var(--fs));color:var(--gold);text-transform:uppercase;letter-spacing:1.3px;margin-bottom:5px}
.sbio{font-size:calc(13px * var(--fs));color:var(--text);line-height:1.65;margin-bottom:14px}
.faits-list{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.fitem{background:rgba(201,168,76,.07);border-radius:8px;padding:8px 11px;border-left:2px solid var(--gold)}
.ft{font-size:calc(12.5px * var(--fs));color:var(--gold2);font-style:italic}
.fy{font-size:calc(10px * var(--fs));color:var(--muted);margin-top:1px}
/* Médaille décorative */
.medal-banner{margin:12px 16px 0;padding:10px 14px;background:linear-gradient(135deg,rgba(139,26,26,.25),rgba(201,168,76,.1));border:1px solid rgba(201,168,76,.25);border-radius:12px;display:flex;align-items:center;gap:10px}
.medal-icon{font-size:calc(28px * var(--fs));flex-shrink:0}
.medal-info{flex:1}
.medal-year{font-size:calc(11px * var(--fs));color:var(--gold);letter-spacing:.5px}
.medal-grade-full{font-size:calc(12px * var(--fs));color:var(--text);margin-top:2px;font-style:italic}
/* SETTINGS */
.settings-panel{position:fixed;inset:0;background:var(--bg);z-index:200;display:none;flex-direction:column;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
.settings-panel.on{display:flex}
.sett-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--sep)}
.sett-hdr h2{font-size:calc(15px * var(--fs));color:var(--gold);font-style:italic;font-weight:normal}
.sett-scroll{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}
.apps-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.apps-grid-item{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
.apps-grid-item img{width:56px;height:56px;border-radius:13px;background:#1a1a1a}
.apps-grid-item span{font-size:calc(9px * var(--fs));color:var(--muted);text-align:center;line-height:1.2}
.apps-badge{display:block;margin:0 auto 8px;height:40px}
.fs-control{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.05);border-radius:12px;padding:12px 16px;margin-bottom:16px;border:1px solid var(--sep)}
.fs-label{font-size:calc(13px * var(--fs));color:var(--text)}
.fs-btns{display:flex;align-items:center;gap:12px}
.fs-btn{background:rgba(201,168,76,.15);border:1px solid var(--sep);color:var(--gold);width:34px;height:34px;border-radius:8px;font-size:calc(20px * var(--fs));cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.fs-val{font-size:calc(15px * var(--fs));color:var(--gold2);min-width:36px;text-align:center}
/* QUIZ */
.quiz-btn-sheet{background:linear-gradient(135deg,var(--red),#5a0a0a);border:none;border-radius:10px;color:var(--gold2);font-size:calc(13px * var(--fs));padding:11px;cursor:pointer;width:100%;margin-top:10px;font-family:inherit;font-style:italic;letter-spacing:.4px}
.quiz-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:250;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;padding-top:calc(20px + env(safe-area-inset-top));padding-bottom:calc(20px + env(safe-area-inset-bottom))}
.quiz-overlay.on{display:flex}
.quiz-card{background:var(--bg2);border-radius:20px;padding:20px;width:100%;max-width:420px;border:1px solid rgba(201,168,76,.2);position:relative}
.quiz-close-btn{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--muted);font-size:calc(24px * var(--fs));cursor:pointer;line-height:1}
.quiz-progress{font-size:calc(11px * var(--fs));color:var(--muted);text-align:center;margin-bottom:10px;letter-spacing:1px}
.quiz-img{width:100%;aspect-ratio:4/3;object-fit:contain;object-position:center center;border-radius:10px;margin-bottom:12px;background:#1e1510;display:block}
.quiz-q{font-size:calc(15px * var(--fs));color:var(--text);margin-bottom:14px;text-align:center;line-height:1.5;min-height:44px}
.quiz-opts{display:flex;flex-direction:column;gap:7px}
.quiz-opt{background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.15);border-radius:10px;padding:11px;color:var(--text);font-size:calc(13px * var(--fs));cursor:pointer;text-align:left;font-family:inherit;transition:all .2s}
.quiz-opt.correct{background:rgba(50,180,80,.2);border-color:#32b450;color:#7dffaa}
.quiz-opt.wrong{background:rgba(180,50,50,.2);border-color:#b43232;color:#ff8888}
.quiz-score-num{font-size:calc(32px * var(--fs));color:var(--gold2);text-align:center;margin:14px 0 4px;font-style:italic}
.quiz-score-lbl{font-size:calc(13px * var(--fs));color:var(--muted);text-align:center;margin-bottom:14px}
.quiz-next{background:var(--gold);color:var(--bg);border:none;border-radius:10px;padding:12px;font-size:calc(14px * var(--fs));cursor:pointer;width:100%;margin-top:10px;font-family:inherit;font-weight:bold}
.quiz-replay{background:var(--red);color:var(--gold2);border:none;border-radius:10px;padding:12px;font-size:calc(14px * var(--fs));cursor:pointer;width:100%;margin-top:8px;font-family:inherit;font-style:italic}
/* HISTOIRE PANEL */
.histoire-panel{position:fixed;inset:0;background:var(--bg);z-index:200;display:none;flex-direction:column;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
.histoire-panel.on{display:flex}
.hist-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--sep);flex-shrink:0}
.hist-hdr h2{font-size:calc(15px * var(--fs));color:var(--gold);font-style:italic;font-weight:normal}
.hist-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 20px}
/* Hero bannière */
.hist-hero{background:linear-gradient(160deg,#1a0a0a 0%,#0f0a00 60%,#0b0a06 100%);padding:24px 20px 20px;text-align:center;border-bottom:1px solid var(--sep);position:relative;overflow:hidden}
.hist-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(139,26,26,.35) 0%,transparent 70%);pointer-events:none}
.hist-ribbon{font-size:calc(56px * var(--fs));margin-bottom:8px;position:relative;z-index:1}
.hist-hero-title{font-size:calc(20px * var(--fs));color:var(--gold2);font-style:italic;line-height:1.25;margin-bottom:6px;position:relative;z-index:1}
.hist-hero-sub{font-size:calc(11px * var(--fs));color:var(--muted);letter-spacing:1px;text-transform:uppercase;position:relative;z-index:1}
/* Ligne de stats */
.hist-stats{display:flex;border-bottom:1px solid var(--sep)}
.hist-stat{flex:1;text-align:center;padding:14px 8px;border-right:1px solid var(--sep)}
.hist-stat:last-child{border-right:none}
.hist-stat-num{font-size:calc(20px * var(--fs));color:var(--gold2);font-style:italic;font-weight:normal}
.hist-stat-lbl{font-size:calc(9px * var(--fs));color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
/* Sections */
.hist-section{padding:18px 18px 0}
.hist-sec-title{font-size:calc(11px * var(--fs));color:var(--gold);text-transform:uppercase;letter-spacing:1.4px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--sep)}
.hist-para{font-size:calc(13px * var(--fs));color:var(--text);line-height:1.7;margin-bottom:12px}
/* Timeline */
.hist-timeline{display:flex;flex-direction:column;gap:0;margin-bottom:4px}
.hist-titem{display:flex;gap:12px;padding-bottom:16px;position:relative}
.hist-titem::before{content:'';position:absolute;left:17px;top:28px;bottom:0;width:1px;background:rgba(201,168,76,.2)}
.hist-titem:last-child::before{display:none}
.hist-tdot{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--red),#5a0a0a);border:2px solid var(--gold);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:calc(14px * var(--fs));z-index:1}
.hist-tcontent{flex:1;padding-top:4px}
.hist-tyear{font-size:calc(11px * var(--fs));color:var(--gold);letter-spacing:.5px;margin-bottom:2px}
.hist-tevent{font-size:calc(13px * var(--fs));color:var(--text);line-height:1.5}
/* Grades */
.hist-grades{display:flex;flex-direction:column;gap:8px;margin-bottom:4px}
.hist-grade-item{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border-radius:10px;padding:10px 12px;border:1px solid var(--sep)}
.hist-grade-stars{font-size:calc(15px * var(--fs));flex-shrink:0;min-width:52px;text-align:center}
.hist-grade-name{font-size:calc(13px * var(--fs));color:var(--gold2);font-style:italic}
.hist-grade-desc{font-size:calc(10.5px * var(--fs));color:var(--muted);margin-top:1px}
/* Devise */
.hist-devise{margin:16px 18px;padding:14px 16px;background:linear-gradient(135deg,rgba(139,26,26,.2),rgba(201,168,76,.08));border:1px solid rgba(201,168,76,.3);border-radius:12px;text-align:center}
.hist-devise-text{font-size:calc(16px * var(--fs));color:var(--gold2);font-style:italic;letter-spacing:.5px}
.hist-devise-sub{font-size:calc(10px * var(--fs));color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:1px}
/* iPad */
@media(min-width:768px){
  .hist-hero-title{font-size:calc(24px * var(--fs))}
  .hist-para{font-size:calc(16px * var(--fs))}
  .hist-tevent{font-size:calc(15px * var(--fs))}
  .hist-grade-name{font-size:calc(15px * var(--fs))}
}
/* iPad */
@media(min-width:768px){
  .apps-grid{grid-template-columns:repeat(6,1fr)!important}
  .header h1{font-size:calc(21px * var(--fs))}
  .row-name{font-size:calc(18px * var(--fs))}
  .row-dates{font-size:calc(14px * var(--fs))}
  .row-cat{font-size:calc(13px * var(--fs))}
  .chip{font-size:calc(14px * var(--fs));padding:7px 16px}
  .search-input{font-size:calc(16px * var(--fs))}
  .section-hdr{font-size:calc(13px * var(--fs))}
  .row-img{width:70px;height:70px}
  .sh-name{font-size:calc(26px * var(--fs))}
  .sbio{font-size:calc(16px * var(--fs))}
  .ft{font-size:calc(15px * var(--fs))}
  .fy{font-size:calc(12px * var(--fs))}
}
/* SOCIÉTÉ CIVILE */
.soc-hero{background:linear-gradient(160deg,#060e16 0%,#0a1208 60%,#0b0a06 100%);padding:24px 20px 20px;text-align:center;border-bottom:1px solid var(--sep);position:relative;overflow:hidden}
.soc-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(26,80,139,.3) 0%,transparent 70%);pointer-events:none}
.soc-domains-bar{display:flex;flex-wrap:wrap;gap:4px;padding:10px 14px;border-bottom:1px solid var(--sep);flex-shrink:0}
.soc-domain-chip{display:inline-block;padding:4px 11px;border-radius:20px;font-size:calc(10px * var(--fs));border:1px solid rgba(201,168,76,.2);color:var(--muted);background:none;cursor:pointer;transition:all .18s;font-family:inherit;white-space:nowrap}
.soc-domain-chip.active{background:rgba(26,80,139,.25);border-color:#4a90c4;color:#a8d4f0}
.soc-cards-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:20px}
.soc-intro{margin:12px 14px 0;padding:12px 14px;background:linear-gradient(135deg,rgba(26,80,139,.15),rgba(201,168,76,.06));border:1px solid rgba(74,144,196,.2);border-radius:12px}
.soc-intro-title{font-size:calc(13px * var(--fs));color:#a8d4f0;font-style:italic;margin-bottom:5px}
.soc-intro-text{font-size:calc(12px * var(--fs));color:var(--text);line-height:1.65}
.soc-stats{display:flex;border-top:1px solid var(--sep);border-bottom:1px solid var(--sep);margin-top:12px}
.soc-stat{flex:1;text-align:center;padding:11px 6px;border-right:1px solid var(--sep)}
.soc-stat:last-child{border-right:none}
.soc-stat-num{font-size:calc(17px * var(--fs));color:#a8d4f0;font-style:italic}
.soc-stat-lbl{font-size:calc(9px * var(--fs));color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-top:2px}
.soc-section-hdr{padding:12px 14px 5px;font-size:calc(10px * var(--fs));color:#a8d4f0;text-transform:uppercase;letter-spacing:1.4px;background:var(--bg);position:sticky;top:0;border-bottom:1px solid var(--sep)}
.soc-card{margin:10px 14px;background:var(--card);border-radius:14px;border:1px solid var(--sep);overflow:hidden;cursor:pointer;transition:background .15s}
.soc-card:active{background:#1e1a10}
.soc-card-top{display:flex;align-items:center;gap:12px;padding:12px 14px 8px}
.soc-card-img{width:60px;height:60px;border-radius:10px;background:#1a1510;flex-shrink:0;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;font-size:calc(28px * var(--fs))}
.soc-card-img img{width:100%;height:100%;object-fit:cover;object-position:center 20%;position:absolute;inset:0;display:none}
.soc-card-info{flex:1;min-width:0}
.soc-card-name{font-size:calc(14px * var(--fs));color:var(--gold2);font-style:italic;margin-bottom:2px}
.soc-card-dates{font-size:calc(10px * var(--fs));color:var(--muted);margin-bottom:3px}
.soc-card-titre{font-size:calc(11px * var(--fs));color:var(--text);line-height:1.35}
.soc-card-bottom{padding:0 14px 12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.soc-domain-tag{padding:3px 9px;border-radius:20px;font-size:calc(9.5px * var(--fs));background:rgba(26,80,139,.2);border:1px solid rgba(74,144,196,.3);color:#a8d4f0}
.soc-grade-tag{padding:3px 9px;border-radius:20px;font-size:calc(9.5px * var(--fs));background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.28);color:var(--gold)}
.soc-year-tag{padding:3px 9px;border-radius:20px;font-size:calc(9.5px * var(--fs));background:rgba(255,255,255,.05);border:1px solid var(--sep);color:var(--muted)}
/* Sheet société */
.soc-sheet-intro{margin:10px 16px 0;padding:10px 13px;background:rgba(26,80,139,.12);border:1px solid rgba(74,144,196,.2);border-radius:10px}
.soc-sheet-action{font-size:calc(11px * var(--fs));color:#a8d4f0;font-style:italic;line-height:1.5}
@media(min-width:768px){
  .soc-card-name{font-size:calc(17px * var(--fs))}
  .soc-card-titre{font-size:calc(13px * var(--fs))}
  .soc-card-img{width:74px;height:74px}
}
/* REFUS CÉLÈBRES */

// ─── IMAGES WIKIPEDIA ────────────────────────────────────────────────────────
function loadImg(p){
  if(!CapHttp||!p.wt) return;
  var wt=p.wt;
  CapHttp.get({url:'https://fr.wikipedia.org/w/api.php?action=query&titles='+encodeURIComponent(wt)+'&prop=pageimages&pithumbsize=400&format=json',headers:{}})
  .then(function(r){
    var data=typeof r.data==='string'?JSON.parse(r.data):r.data;
    var pages=data.query&&data.query.pages;
    if(!pages) return tryWf(p);
    var pg=Object.values(pages)[0];
    if(pg&&pg.thumbnail&&pg.thumbnail.source) return fetchImg(p.id,pg.thumbnail.source);
    tryWf(p);
  }).catch(function(){ tryWf(p); });
}
function tryWf(p){
  if(!CapHttp||!p.wf) return;
  var url='https://commons.wikimedia.org/w/api.php?action=query&titles=File:'+encodeURIComponent(p.wf)+'&prop=pageimages&pithumbsize=400&format=json';
  CapHttp.get({url:url,headers:{}}).then(function(r){
    var data=typeof r.data==='string'?JSON.parse(r.data):r.data;
    var pages=data.query&&data.query.pages;
    if(!pages) return;
    var pg=Object.values(pages)[0];
    if(pg&&pg.thumbnail&&pg.thumbnail.source) fetchImg(p.id,pg.thumbnail.source);
  }).catch(function(){});
}
function fetchImg(pid,src){
  if(!CapHttp) return;
  CapHttp.get({url:src,responseType:'arraybuffer',headers:{}}).then(function(r){
    var b64='data:image/jpeg;base64,'+r.data;
    imgCache[pid]=b64;
    applyImgToDOM(pid,b64);
  }).catch(function(){});
}
function applyImgToDOM(pid,b64){
  document.querySelectorAll('.row-img[data-pid="'+pid+'"] img').forEach(function(i){i.src=b64;i.style.display='block';});
  document.querySelectorAll('.soc-card-img[data-pid="'+pid+'"] img').forEach(function(i){i.src=b64;i.style.display='block';});
  if(currentSheetId===pid){
    var si=document.getElementById('shImg');
    if(si){si.src=b64;si.style.display='block';var ph=document.getElementById('shImgPh');if(ph)ph.style.display='none';}
    var qi=document.getElementById('quizImgEl');
    if(qi&&qi.dataset.pid===pid){qi.src=b64;}
  }
}

function getCats(){
  var all=[];
  LEGION.forEach(function(p){if(all.indexOf(p.cat)<0)all.push(p.cat);});
  return all;
}
function renderChips(){
  var bar=document.getElementById('chipsBar');
  bar.innerHTML='';
  var all=document.createElement('button');
  all.className='chip'+(currentFilter==='tous'?' active':'');
  all.textContent=LANG==='fr'?'Tous':'All';
  all.onclick=function(){currentFilter='tous';renderChips();renderList();};
  bar.appendChild(all);
  getCats().forEach(function(c){
    var btn=document.createElement('button');
    btn.className='chip'+(currentFilter===c?' active':'');
    btn.textContent=CATEGORIES[c]?CATEGORIES[c][LANG]:c;
    btn.onclick=function(){currentFilter=c;renderChips();renderList();};
    bar.appendChild(btn);
  });
}
function filtered(){
  return LEGION.filter(function(p){
    var d=p[LANG]||p.fr;
    var matchCat=(currentFilter==='tous'||p.cat===currentFilter);
    var q=searchQ.trim().toLowerCase();
    var matchSearch=!q||d.name.toLowerCase().indexOf(q)>=0||d.titre.toLowerCase().indexOf(q)>=0||(CATEGORIES[p.cat]&&CATEGORIES[p.cat][LANG].toLowerCase().indexOf(q)>=0);
    return matchCat&&matchSearch;
  });
}
function renderList(){
  var list=document.getElementById('mainList');
  list.innerHTML='';
  var items=filtered();
  if(!items.length){
    list.innerHTML='<div class="empty">'+(LANG==='fr'?'Aucun résultat':'No results')+'</div>';
    return;
  }
  // Grouper par catégorie
  var groups={};
  items.forEach(function(p){
    if(!groups[p.cat])groups[p.cat]=[];
    groups[p.cat].push(p);

  Object.keys(groups).forEach(function(cat){

// ─── QUIZ ─────────────────────────────────────────────────────────────────────
function buildQuiz(cat){
  var pool=LEGION.filter(function(p){return !cat||p.cat===cat;});
  if(pool.length<3) pool=LEGION;
  var shuffled=pool.slice().sort(function(){return Math.random()-.5;});
  var q=shuffled.slice(0,Math.min(10,shuffled.length));
  var allNames=LEGION.map(function(p){return (p[LANG]||p.fr).name;});
  quizData=q.map(function(p){
    var d=p[LANG]||p.fr;
    var wrong=allNames.filter(function(n){return n!==d.name;}).sort(function(){return Math.random()-.5;}).slice(0,3);
    var opts=[d.name].concat(wrong).sort(function(){return Math.random()-.5;});
    var qtype='titre';
    if(p.cat==='refus') qtype='refus';
    else if(p.cat==='societe') qtype=Math.random()<0.5?'action':'titre';
    return {pid:p.id,name:d.name,correct:d.name,options:opts,titre:d.titre,action:d.action||'',raison:d.raison||'',cat:p.cat,qtype:qtype};
  });
  quizIdx=0;quizScore=0;quizAnswered=false;
}
function startQuizGlobal(){
  buildQuiz(currentFilter==='tous'?null:currentFilter);
  document.getElementById('quizOverlay').classList.add('on');
  renderQuizQ();
}
function startQuizFromSheet(){
  var p=LEGION.filter(function(x){return x.id===currentSheetId;})[0];
  closeSheet();
  buildQuiz(p?p.cat:null);
  document.getElementById('quizOverlay').classList.add('on');
  renderQuizQ();
}
function closeQuiz(){document.getElementById('quizOverlay').classList.remove('on');}
function renderQuizQ(){
  var card=document.getElementById('quizCard');
  if(quizIdx>=quizData.length){
    var pct=Math.round(quizScore/quizData.length*100);
    var mention='';
    if(pct===100) mention=LANG==='fr'?'🏆 Parfait !':'🏆 Perfect!';
    else if(pct>=70) mention=LANG==='fr'?'👏 Très bien !':'👏 Well done!';
    else if(pct>=40) mention=LANG==='fr'?'📚 Pas mal !':'📚 Not bad!';
    else mention=LANG==='fr'?'💡 À revoir...':'💡 Keep learning...';
    card.innerHTML='<button class="quiz-close-btn" onclick="closeQuiz()">✕</button>'+
      '<div class="quiz-score-num">'+quizScore+' / '+quizData.length+'</div>'+
      '<div class="quiz-score-lbl">'+mention+'</div>'+
      '<button class="quiz-next" onclick="closeQuiz()">'+(LANG==='fr'?'Fermer':'Close')+'</button>'+
      '<button class="quiz-replay" onclick="startQuizGlobal()">'+(LANG==='fr'?'Rejouer':'Replay')+'</button>';
    return;
  }
  var q=quizData[quizIdx];
  var p=LEGION.filter(function(x){return x.id===q.pid;})[0];
  var imgSrc=imgCache[q.pid]||'';
  var question='';
  if(q.qtype==='refus'){
    var cit=q.raison?q.raison.substring(0,90)+(q.raison.length>90?'...':''):'';
    question=LANG==='fr'
      ?'Qui a <b>refusé</b> la Légion d\'Honneur&nbsp;?<br><small style="color:var(--muted);font-size:.82em;font-style:italic;line-height:1.4;display:block;margin-top:5px">'+cit+'</small>'
      :'Who <b>refused</b> the Legion of Honor?<br><small style="color:var(--muted);font-size:.82em;font-style:italic;line-height:1.4;display:block;margin-top:5px">'+cit+'</small>';
  } else if(q.qtype==='action'&&q.action){
    question=LANG==='fr'
      ?'Qui a accompli cet acte&nbsp;?<br><small style="color:var(--gold2);font-size:.82em;font-style:italic;line-height:1.4;display:block;margin-top:5px">'+q.action+'</small>'
      :'Who accomplished this act?<br><small style="color:var(--gold2);font-size:.82em;font-style:italic;line-height:1.4;display:block;margin-top:5px">'+q.action+'</small>';
  } else {
    question=LANG==='fr'
      ?'Qui est <b>'+q.titre+'</b>&nbsp;?'
      :'Who is the <b>'+q.titre+'</b>?';
  }
  var catIcon=q.cat==='refus'?'🚫':q.cat==='societe'?'🤝':'🎖️';
  var imgHtml=imgSrc
    ?'<img id="quizImgEl" data-pid="'+q.pid+'" class="quiz-img" src="'+imgSrc+'" alt="">'
    :'<img id="quizImgEl" data-pid="'+q.pid+'" class="quiz-img" style="display:none" alt="">';
  var optsHtml=q.options.map(function(o){
    var safe=o.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    return '<button class="quiz-opt" data-val="'+safe+'" onclick="answerQuiz(this)">'+o+'</button>';
  }).join('');
  card.innerHTML='<button class="quiz-close-btn" onclick="closeQuiz()">✕</button>'+
    '<div class="quiz-progress">'+catIcon+' Question '+(quizIdx+1)+'/'+quizData.length+'</div>'+
    imgHtml+
    '<div class="quiz-q">'+question+'</div>'+
    '<div class="quiz-opts">'+optsHtml+'</div>';
  quizAnswered=false;
  if(!imgSrc) loadImg(p);
}
function answerQuiz(btn){
  if(quizAnswered) return;
  quizAnswered=true;
  var chosen=btn.getAttribute('data-val');
  var correct=quizData[quizIdx].correct;
  document.querySelectorAll('.quiz-opt').forEach(function(b){
    b.disabled=true;
    if(b.getAttribute('data-val')===correct)b.classList.add('correct');
  });
  if(chosen===correct){quizScore++;btn.classList.add('correct');}
  else btn.classList.add('wrong');
  var next=document.createElement('button');
  next.className='quiz-next';
  next.textContent=quizIdx+1>=quizData.length
    ?(LANG==='fr'?'Voir le score':'See score')
    :(LANG==='fr'?'Question suivante →':'Next →');
  next.onclick=function(){quizIdx++;renderQuizQ();};
  document.getElementById('quizCard').appendChild(next);
}

       text:'Beyond military and political figures, the Legion of Honor rewards women and men who have transformed France through humanitarian commitment, entrepreneurial genius, fights for rights, or cultural influence. These figures changed French society and often the world.'};

  var html = '<div class="soc-intro"><div class="soc-intro-title">'+intro.title+'</div>'+
    '<div class="soc-intro-text">'+intro.text+'</div></div>';

  html += '<div class="soc-stats">'+
    '<div class="soc-stat"><div class="soc-stat-num">'+items.length+'</div><div class="soc-stat-lbl">'+(LANG==='fr'?'Récipiendaires':'Recipients')+'</div></div>'+
    '<div class="soc-stat"><div class="soc-stat-num">6</div><div class="soc-stat-lbl">'+(LANG==='fr'?'Domaines':'Domains')+'</div></div>'+
    '<div class="soc-stat"><div class="soc-stat-num">5</div><div class="soc-stat-lbl">'+(LANG==='fr'?'Grades':'Ranks')+'</div></div>'+
    '</div>';

  if(!items.length){
    html += '<div class="empty">'+(LANG==='fr'?'Aucun résultat':'No results')+'</div>';
    scroll.innerHTML = html; return;
  }

  // Grouper par domaine si filtre = tous
  if(socDomainFilter==='tous'){
    var groups={};
    items.forEach(function(p){ if(!groups[p.domain])groups[p.domain]=[]; groups[p.domain].push(p); });
    Object.keys(groups).forEach(function(dom){
      html += '<div class="soc-section-hdr">'+(SOC_DOMAINS[dom]?SOC_DOMAINS[dom][LANG]:dom)+'</div>';
      groups[dom].forEach(function(p){ html += buildSocCard(p); });
    });
  } else {
    items.forEach(function(p){ html += buildSocCard(p); });
  }
  scroll.innerHTML = html;
  // Charger images
  items.forEach(function(p){ if(!imgCache[p.id]) loadImg(p); else applyImgToSoc(p.id,imgCache[p.id]); });
}
function buildSocCard(p){
  var d = p[LANG]||p.fr;
  var imgB64 = imgCache[p.id]||'';
  var domLabel = SOC_DOMAINS[p.domain]?SOC_DOMAINS[p.domain][LANG]:p.domain;
  var gradeLabel = GRADES[p.grade]?GRADES[p.grade][LANG]:p.grade;
  return '<div class="soc-card" onclick="openSheetSoc(\''+p.id+'\')" data-socid="'+p.id+'">'+
    '<div class="soc-card-top">'+
      '<div class="soc-card-img" data-pid="'+p.id+'"><span>'+p.emoji+'</span>'+(imgB64?'<img src="'+imgB64+'" style="display:block">':'<img src="">')+'</div>'+
      '<div class="soc-card-info">'+
        '<div class="soc-card-name">'+d.name+' '+p.flag+'</div>'+
        '<div class="soc-card-dates">'+d.dates+'</div>'+
        '<div class="soc-card-titre">'+d.titre+'</div>'+
      '</div>'+
    '</div>'+
    '<div class="soc-card-bottom">'+
      '<span class="soc-domain-tag">'+domLabel+'</span>'+
      '<span class="soc-grade-tag">🎖️ '+gradeLabel+'</span>'+
      '<span class="soc-year-tag">'+p.year+'</span>'+
    '</div>'+
    '</div>';
}
function applyImgToSoc(pid,b64){
  document.querySelectorAll('#societeScroll .soc-card-img[data-pid="'+pid+'"] img').forEach(function(i){i.src=b64;i.style.display='block';});
}
function openSheetSoc(id){
  var p = LEGION.filter(function(x){return x.id===id;})[0];
  if(!p) return;
  closeSociete();
  // Réutilise la sheet principale
  currentSheetId = id;
  var d = p[LANG]||p.fr;
  document.getElementById('shName').textContent = d.name;
  document.getElementById('shDates').textContent = d.dates;
  document.getElementById('shCountry').textContent = d.country||'';
  var tw = document.getElementById('shTagWrap');
  var domLabel = (SOC_DOMAINS[p.domain]||CATEGORIES[p.cat]||{fr:p.domain||p.cat})[LANG]||'';
  tw.innerHTML = '<span class="sh-tag">'+domLabel+'</span>'+
    '<span class="sh-grade">🎖️ '+(GRADES[p.grade]?GRADES[p.grade][LANG]:p.grade)+'</span>';
  document.getElementById('medalYear').textContent = (LANG==='fr'?'Nommé en ':'Appointed in ')+p.year;
  document.getElementById('medalGrade').textContent = GRADES[p.grade]?GRADES[p.grade][LANG]:p.grade;
  var si = document.getElementById('shImg');
  var ph = document.getElementById('shImgPh');
  si.style.display='none'; si.src=''; ph.textContent=p.emoji; ph.style.display='block';
  if(imgCache[id]){si.src=imgCache[id];si.style.display='block';ph.style.display='none';}
  else loadImg(p);
  document.getElementById('shCap').textContent = d.caption||d.action||'';
  document.getElementById('shBioLbl').textContent = LANG==='fr'?'Biographie':'Biography';
  document.getElementById('shBio').textContent = d.bio;
  document.getElementById('shFaitsLbl').textContent = LANG==='fr'?'Faits marquants':'Key Facts';
  var fl = document.getElementById('shFaits');
  fl.innerHTML = '';
  (d.faits||[]).forEach(function(f){ fl.innerHTML+='<div class="fitem"><div class="ft">'+f.t+'</div><div class="fy">'+f.y+'</div></div>'; });
  document.getElementById('overlay').classList.add('on');
  document.getElementById('sheet').classList.add('on');
}

function openHistoire(){
  document.getElementById('histoirePanel').classList.add('on');
  renderHistoire();
}
function closeHistoire(){
  document.getElementById('histoirePanel').classList.remove('on');
}
function renderHistoire(){
  var h = HISTOIRE[LANG] || HISTOIRE.fr;
  document.getElementById('histTitle').textContent = h.title;
  var scroll = document.getElementById('histScroll');
  var html = '';
  // Hero
  html += '<div class="hist-hero">'+
    '<div class="hist-ribbon">🎖️</div>'+
    '<div class="hist-hero-title">'+h.hero_title+'</div>'+
    '<div class="hist-hero-sub">'+h.hero_sub+'</div>'+
    '</div>';
  // Stats
  html += '<div class="hist-stats">';
  h.stats.forEach(function(s){
    html += '<div class="hist-stat">'+
      '<div class="hist-stat-num">'+s.num+'</div>'+
      '<div class="hist-stat-lbl">'+s.lbl+'</div>'+
      '</div>';
  });
  html += '</div>';
  // Sections
  h.sections.forEach(function(sec){
    html += '<div class="hist-section">';
    html += '<div class="hist-sec-title">'+sec.title+'</div>';
    // Devise
    if(sec.devise){
      html += '<div class="hist-devise">'+
        '<div class="hist-devise-text">'+sec.devise.text+'</div>'+
        '<div class="hist-devise-sub">'+sec.devise.sub+'</div>'+
        '</div>';
    }
    // Paragraphes
    if(sec.paras){
      sec.paras.forEach(function(p){
        html += '<div class="hist-para">'+p+'</div>';
      });
    }
    // Grades
    if(sec.grades){
      html += '<div class="hist-grades">';
      sec.grades.forEach(function(g){
        html += '<div class="hist-grade-item">'+
          '<div class="hist-grade-stars">'+g.stars+'</div>'+
          '<div><div class="hist-grade-name">'+g.name+'</div>'+
          '<div class="hist-grade-desc">'+g.desc+'</div></div>'+
          '</div>';
      });
      html += '</div>';
    }
    // Timeline
    if(sec.timeline){
      html += '<div class="hist-timeline">';
      sec.timeline.forEach(function(t){
        html += '<div class="hist-titem">'+
          '<div class="hist-tdot">'+t.emoji+'</div>'+
          '<div class="hist-tcontent">'+
            '<div class="hist-tyear">'+t.year+'</div>'+
            '<div class="hist-tevent">'+t.event+'</div>'+
          '</div>'+
          '</div>';
      });
      html += '</div>';
    }
    html += '</div>';
  });
  scroll.innerHTML = html;
}
